<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Core Systems</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="style.css" rel="stylesheet">
</head>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f9f9f9; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1 0 auto; }
        form { background-color: #ffffff; border: 1px solid #dddddd; border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <span class="container">
            <a class="navbar-brand py-0" href="index.html">
                <img src="Futuristic QCS logo design.png" alt="Quantum Core Systems Logo" style="height: 45px; width: auto;">
            </a>
            <span class="navbar-nav gap-2 ms-auto d-none d-lg-flex">
                <a class="nav-link text-dark" href="index.html">Home</a>
                <a class="nav-link text-dark" href="product-detail.html">Shop Laptops</a>
                <a class="nav-link text-dark" href="cart.html">Cart</a>
                <a class="nav-link text-dark" href="checkout.html">Checkout</a>
                <a class="nav-link text-dark" href="post-purchase.html">My Orders</a>
                <a class="nav-link active fw-bold text-primary" href="feedback.html">Feedback</a>
            </span>
        </span>
    </nav>

    <main class="container py-5" style="max-width: 600px;">
        <h1 class="h2 fw-bold mb-2 text-center text-dark">We Value Your Feedback</h1>
        <p class="text-muted small text-center mb-4">Transmit system metrics, alignment concerns, or platform reviews to core technicians.</p>
        
        <form class="p-4 p-md-5 shadow-sm" onsubmit="handleFormSubmission(event)">
            <span class="d-block mb-3">
                <label class="form-label small fw-bold text-secondary">Operator Identity Name</label>
                <input type="text" class="form-control form-control-lg fs-6" placeholder="Jane Doe" required>
            </span>

            <span class="d-block mb-3">
                <label class="form-label small fw-bold text-secondary">Secure Correspondence Email</label>
                <input type="email" class="form-control form-control-lg fs-6" placeholder="jane@domain.com" required>
            </span>

            <span class="d-block mb-4">
                <label class="form-label small fw-bold text-secondary">Detailed Message Scope</label>
                <textarea class="form-control form-control-lg fs-6" rows="5" placeholder="Provide structural evaluation data here..." required></textarea>
            </span>

            <button type="submit" class="btn btn-dark btn-lg w-100 py-3 fw-bold text-uppercase rounded-3">
                Submit System Feedback
            </button>
        </form>
    </main>

    <script>
        function handleFormSubmission(event) {
            event.preventDefault();
            alert("Transmission Confirmed: Feedback matrix recorded securely inside Quantum Core Logs.");
            event.target.reset();
        }
    </script>

    <footer class="bg-white border-top py-4 mt-auto">
        <span class="container d-block text-center text-muted small">&copy; 2026 Quantum Core Systems — All Rights Reserved</span>
    </footer>

</body>
</html>
