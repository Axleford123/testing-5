<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Core Systems</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="style.css" rel="stylesheet">
</head>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f9f9f9; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1 0 auto; }
        form { background-color: #ffffff; border: 1px solid #dddddd; border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <span class="container">
            <a class="navbar-brand py-0" href="index.html">
                <img src="Futuristic QCS logo design.png" alt="Quantum Core Systems Logo" style="height: 45px; width: auto;">
            </a>
            <span class="navbar-nav gap-2 ms-auto d-none d-lg-flex">
                <a class="nav-link text-dark" href="index.html">Home</a>
                <a class="nav-link text-dark" href="product-detail.html">Shop Laptops</a>
                <a class="nav-link text-dark" href="cart.html">Cart</a>
                <a class="nav-link active fw-bold text-primary" href="checkout.html">Checkout</a>
                <a class="nav-link text-dark" href="post-purchase.html">My Orders</a>
                <a class="nav-link text-dark" href="feedback.html">Feedback</a>
            </span>
        </span>
    </nav>

    <main class="container py-5" style="max-width: 650px;">
        <h1 class="h2 fw-bold mb-4 text-center">Shipping &amp; Payment Verification</h1>
        
        <form class="p-4 p-md-5 shadow-sm" action="post-purchase.html" method="GET">
            <h2 class="h5 fw-bold mb-4 border-bottom pb-2 text-secondary text-uppercase tracking-wide">Operator Logistics Info</h2>
            
            <span class="d-block mb-3">
                <label class="form-label small fw-semibold text-secondary">Full Name Identifier</label>
                <input type="text" class="form-control form-control-lg fs-6" placeholder="John Doe" required>
            </span>

            <span class="d-block mb-3">
                <label class="form-label small fw-semibold text-secondary">Secure Digital Email Correspondence</label>
                <input type="email" class="form-control form-control-lg fs-6" placeholder="john@quantscore.com" required>
            </span>

            <span class="d-block mb-4">
                <label class="form-label small fw-semibold text-secondary">Physical Destination Address Coordinates</label>
                <input type="text" class="form-control form-control-lg fs-6" placeholder="Plot 4072, Gaborone Innovation Hub" required>
            </span>

            <button type="submit" class="btn btn-dark btn-lg w-100 py-3 fw-bold rounded-3 text-uppercase">
                Authorize &amp; Place Order
            </button>
        </form>
    </main>

    <footer class="bg-white border-top py-4 mt-auto">
        <span class="container d-block text-center text-muted small">&copy; 2026 Quantum Core Systems.</span>
    </footer>
